[package]
name = "codeforge-core"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
description = "Core engine for CodeForge — AST parsing, indexing, and retrieval"

[features]
default = []
vector = ["dep:ort", "dep:ndarray", "dep:tokenizers"]

[dependencies]
# Optional: ONNX Runtime embedding inference
ort = { version = "2.0.0-rc.11", optional = true }
ndarray = { version = "0.17", optional = true }
tokenizers = { version = "0.22", optional = true, default-features = false, features = ["fancy-regex"] }
# HTTP client for external embedding APIs
reqwest.workspace = true
tree-sitter.workspace = true
tree-sitter-rust.workspace = true
tree-sitter-python.workspace = true
tree-sitter-javascript.workspace = true
tree-sitter-typescript.workspace = true
tree-sitter-go.workspace = true
tree-sitter-java.workspace = true
tree-sitter-c.workspace = true
tree-sitter-cpp.workspace = true
tree-sitter-c-sharp.workspace = true

instant-distance.workspace = true
tantivy.workspace = true
petgraph.workspace = true
notify.workspace = true
dashmap.workspace = true
rayon.workspace = true
serde.workspace = true
serde_json.workspace = true
bitcode.workspace = true
xxhash-rust.workspace = true
thiserror.workspace = true
tracing.workspace = true

[dev-dependencies]
tempfile.workspace = true
