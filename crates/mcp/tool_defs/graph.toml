[[tools]]
name = "cross_imports"
description = "Find files in one directory that import from another directory, ranked by PageRank and git recency. Optionally filter the importing files with a regex pattern when the boundary query mentions a specific symbol/import shape. Useful for cross-package dependency analysis (e.g. 'which gateway files import from the auth module?' or 'which extensions import definePluginEntry from plugin-sdk?'). Returns results sorted by relevance score."
handler = "graph::call_cross_imports"
calling_convention = "engine_args"
read_only = true

[tools.params.from]
type = "string"
description = "Path prefix of the importing directory (e.g. 'src/gateway', 'packages/api')"
required = true

[tools.params.to]
type = "string"
description = "Path prefix of the imported directory (e.g. 'src/auth', 'packages/types')"
required = true

[tools.params.limit]
type = "integer"
description = "Maximum number of results to return (default and hard max: 100)"

[tools.params.pattern]
type = "string"
description = "Optional regex that must match the importing source file (e.g. 'import.*definePluginEntry.*from.*plugin-sdk')"

[[tools]]
name = "get_references"
description = "Get the dependency relationships for a file: which files import it (callers/dependents) and which files it imports (callees/dependencies). Requires graph intelligence to be enabled. Use when you need a file-level (not symbol-level) view of a file's place in the import graph — prefer `search_usages` for symbol-level callers."
handler = "graph::call_get_references"
calling_convention = "engine_args"
read_only = true

[tools.params.file]
type = "string"
description = "Relative file path within the indexed project (e.g. 'src/engine.rs', 'crates/core/src/graph/mod.rs')"
required = true

[[tools]]
name = "get_repo_map"
description = "Generate a hard token-budgeted repository map of key files and symbols. Focused seed files (focus_file / focus_files) rank first; pure test paths are skipped by default. Output never overshoots the budget. Useful for understanding a codebase at a glance before deeper search."
handler = "graph::call_get_repo_map"
calling_convention = "engine_args"
read_only = true

[tools.params.token_budget]
type = "integer"
description = "Hard maximum number of tokens for the repo map (default: 4000)"

[tools.params.focus_file]
type = "string"
description = "Optional task-local file to pin near the top of the map"

[tools.params.focus_files]
type = "array"
description = "Optional list of task-local files to pin near the top of the map"

[[tools]]
name = "get_transitive_deps"
description = "Get a depth-bounded transitive dependency chain for a file \u2014 files it depends on, directly or indirectly, up to the configured depth. Use when tracing what a file relies on; use `predict_impact` or `search_usages` when you need the reverse-direction blast radius."
handler = "graph::call_get_transitive_deps"
calling_convention = "engine_args"
read_only = true

[tools.params.file]
type = "string"
description = "Relative file path to analyse (e.g. 'src/engine.rs')"
required = true

[tools.params.depth]
type = "integer"
description = "Maximum hop depth for transitive traversal (default: 3, hard max: 8)"

[[tools]]
name = "symbol_callers"
description = "Return functions in the codebase that directly call the given symbol. Uses the symbol-level call graph built at index time and is capped by limit. Falls back to BM25 search if the graph has no results for this symbol. Use when modifying a function and you need its direct callers; for a broader deterministic bounded scan, use `search_usages` with `complete=true` and follow its next_offset pages."
handler = "graph::call_symbol_callers"
calling_convention = "engine_args"
read_only = true

[tools.params.symbol]
type = "string"
description = "Symbol name to look up callers for (e.g. 'compute_pagerank')"
required = true

[tools.params.limit]
type = "integer"
description = "Maximum call sites to return (default: 20)"

[[tools]]
name = "symbol_callees"
description = "Return up to `limit` functions that the given symbol directly calls. Uses the symbol-level call graph built at index time. Use when tracing what a function reaches into — the forward direction of `symbol_callers`."
handler = "graph::call_symbol_callees"
calling_convention = "engine_args"
read_only = true

[tools.params.symbol]
type = "string"
description = "Symbol name to look up callees for (e.g. 'compute_pagerank')"
required = true

[tools.params.limit]
type = "integer"
description = "Maximum results to return (default: 20)"

[[tools]]
name = "file_callers"
description = "Return all files that import (depend on) the given file. Returns a plain newline-separated list of relative file paths. Used by the CLI daemon proxy for `codixing callers <file>` to avoid cold process startup."
handler = "graph::call_file_callers"
calling_convention = "engine_args"
read_only = true

[tools.params.path]
type = "string"
description = "Relative file path within the indexed project (e.g. 'src/engine.rs', 'crates/core/src/graph/mod.rs')"
required = true

[[tools]]
name = "file_callees"
description = "Return all files that the given file imports (depends on). Returns a plain newline-separated list of relative file paths. Used by the CLI daemon proxy for `codixing callees <file>` to avoid cold process startup."
handler = "graph::call_file_callees"
calling_convention = "engine_args"
read_only = true

[tools.params.path]
type = "string"
description = "Relative file path within the indexed project (e.g. 'src/engine.rs', 'crates/core/src/graph/mod.rs')"
required = true

[[tools]]
name = "predict_impact"
description = "Given a unified diff, rank the files most likely to need changes based on the call graph and import graph. Useful for blast-radius analysis before committing a change."
handler = "graph::call_predict_impact"
calling_convention = "engine_args_progress"
read_only = true

[tools.params.patch]
type = "string"
description = "Unified diff content \u2014 the planned or committed change to analyze"
required = true

[tools.params.limit]
type = "integer"
description = "Maximum number of impacted files to return (default: 15)"
