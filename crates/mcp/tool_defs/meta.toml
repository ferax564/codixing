[[tools]]
name = "search_tools"
description = "Search available tools by keyword. Returns matching tool names and descriptions without full schemas. Use this to discover which tools are available before calling get_tool_schema."
handler = "self::call_search_tools"
calling_convention = "args_only"
read_only = true
meta = true

[tools.params.query]
type = "string"
description = "Search query to match against tool names and descriptions (e.g. 'search', 'graph', 'file')"
required = true

[[tools]]
name = "get_tool_schema"
description = "Get the full input schema for one or more tools by name. Use this after search_tools when you've identified a candidate tool and need its parameter signature before calling it."
handler = "self::call_get_tool_schema"
calling_convention = "args_only"
read_only = true
meta = true

[tools.params.names]
type = "array"
description = "Tool name(s) to get schemas for (e.g. ['code_search', 'find_symbol'])"
required = true
items_type = "string"

[[tools]]
name = "get_mcp_profile"
description = "Use this to inspect the active MCP tool exposure profile for this connection, along with the available profiles and their safety levels."
handler = "self::call_get_mcp_profile_placeholder"
calling_convention = "args_only"
read_only = true
meta = true

[[tools]]
name = "set_mcp_profile"
description = "Switch the active MCP tool exposure profile for this connection without restarting the server. Use this when an agent needs more or fewer tools than the startup profile exposed."
handler = "self::call_set_mcp_profile_placeholder"
calling_convention = "args_only"
read_only = true
meta = true

[tools.params.profile]
type = "string"
description = "Target profile: minimal, reviewer, editor, or dangerous."
required = true

[tools.params.confirm_dangerous]
type = "boolean"
description = "Required and must be true when switching to the dangerous profile, which exposes destructive filesystem and shell tools."
