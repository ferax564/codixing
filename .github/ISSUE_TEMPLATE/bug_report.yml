name: Bug Report
description: Something isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as much detail as you can.

  - type: input
    id: version
    attributes:
      label: Codixing version
      description: Output of `codixing --version` or the git commit hash
      placeholder: "e.g. 0.1.0 or commit abc1234"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. macOS 14.3, Ubuntu 22.04, Windows 11"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - CLI (codixing)
        - MCP server (codixing-mcp)
        - REST server
        - VS Code extension
        - Indexing / AST parsing
        - Search / retrieval
        - Graph / PageRank
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `codixing init .`
        2. Run `codixing search "..."`
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Run with `RUST_LOG=debug` for verbose output. Redact any sensitive paths.
      render: shell
