name: VSIX Package

on:
  workflow_call:
    inputs:
      upload_artifact:
        description: 'Package and retain the release VSIX in the caller run'
        required: false
        default: false
        type: boolean
  workflow_dispatch:

permissions:
  contents: read

jobs:
  vsix:
    name: Build VSIX
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Package VSIX
        run: npm run package

      - name: Verify packaged metadata and runtime imports
        shell: bash
        run: |
          EXPECTED_VERSION=$(node -p "require('./package.json').version")
          VERIFY_DIR="$RUNNER_TEMP/codixing-vsix-verify"
          rm -rf "$VERIFY_DIR"
          mkdir -p "$VERIFY_DIR"
          unzip -q codixing.vsix -d "$VERIFY_DIR"

          cmp ../../LICENSE LICENSE
          cmp icon.png "$VERIFY_DIR/extension/icon.png"
          cmp LICENSE "$VERIFY_DIR/extension/LICENSE.txt"

          EXPECTED_VERSION="$EXPECTED_VERSION" VERIFY_DIR="$VERIFY_DIR" node - <<'NODE'
          const assert = require('node:assert/strict');
          const fs = require('node:fs');
          const { builtinModules } = require('node:module');
          const path = require('node:path');

          function verifyPng(file) {
            const data = fs.readFileSync(file);
            assert.ok(data.length >= 33, `${file} is too short to be a PNG`);
            assert.deepEqual(
              data.subarray(0, 8),
              Buffer.from([137, 80, 78, 71, 13, 10, 26, 10]),
              `${file} has an invalid PNG signature`,
            );
            assert.equal(data.readUInt32BE(8), 13, `${file} has an invalid IHDR length`);
            assert.equal(data.toString('ascii', 12, 16), 'IHDR');
            assert.equal(data.readUInt32BE(16), 256, `${file} must be 256 px wide`);
            assert.equal(data.readUInt32BE(20), 256, `${file} must be 256 px high`);
          }

          function verifyRuntimeImports(extensionRoot, manifest) {
            const builtins = new Set(
              builtinModules.flatMap((name) => [name, `node:${name}`]),
            );
            const failures = [];
            const pending = [];
            const visited = new Set();
            const requirePattern = /\brequire\(\s*(['"])([^'"]+)\1\s*\)/g;

            function isPackaged(file) {
              const relative = path.relative(extensionRoot, file);
              return relative === '' || (
                !relative.startsWith(`..${path.sep}`) && !path.isAbsolute(relative)
              );
            }

            try {
              const entryPoint = require.resolve(
                path.resolve(extensionRoot, manifest.main),
              );
              if (isPackaged(entryPoint)) {
                pending.push(entryPoint);
              } else {
                failures.push(`extension entry point resolved outside VSIX (${entryPoint})`);
              }
            } catch (error) {
              failures.push(`extension entry point: ${error.code ?? error.message}`);
            }

            while (pending.length > 0) {
              const file = pending.pop();
              if (visited.has(file)) {
                continue;
              }
              visited.add(file);
              const source = fs.readFileSync(file, 'utf8');
              for (const match of source.matchAll(requirePattern)) {
                const request = match[2];
                if (request === 'vscode' || builtins.has(request)) {
                  continue;
                }
                try {
                  const resolved = require.resolve(request, {
                    paths: [path.dirname(file)],
                  });
                  if (!isPackaged(resolved)) {
                    failures.push(
                      `${path.relative(extensionRoot, file)} -> ${request}: resolved outside VSIX (${resolved})`,
                    );
                  } else if (/\.[cm]?js$/i.test(resolved)) {
                    pending.push(resolved);
                  }
                } catch (error) {
                  failures.push(
                    `${path.relative(extensionRoot, file)} -> ${request}: ${error.code ?? error.message}`,
                  );
                }
              }
            }

            for (const dependency of Object.keys(manifest.dependencies ?? {})) {
              try {
                const resolved = require.resolve(dependency, {
                  paths: [extensionRoot],
                });
                if (!isPackaged(resolved)) {
                  failures.push(
                    `package dependency ${dependency}: resolved outside VSIX (${resolved})`,
                  );
                }
              } catch (error) {
                failures.push(
                  `package dependency ${dependency}: ${error.code ?? error.message}`,
                );
              }
            }

            assert.deepEqual(
              failures,
              [],
              `VSIX has unresolved runtime imports:\n${failures.join('\n')}`,
            );
          }

          const root = process.cwd();
          const extracted = path.join(process.env.VERIFY_DIR, 'extension');
          verifyPng(path.join(root, 'icon.png'));
          verifyPng(path.join(extracted, 'icon.png'));

          const manifest = JSON.parse(
            fs.readFileSync(path.join(extracted, 'package.json'), 'utf8'),
          );
          assert.equal(manifest.version, process.env.EXPECTED_VERSION);
          assert.equal(manifest.license, 'Apache-2.0');
          assert.equal(manifest.icon, 'icon.png');
          verifyRuntimeImports(extracted, manifest);

          const vsixManifest = fs.readFileSync(
            path.join(process.env.VERIFY_DIR, 'extension.vsixmanifest'),
            'utf8',
          );
          const identityVersion = vsixManifest.match(
            /<Identity\b[^>]*\bVersion="([^"]+)"/,
          );
          assert.ok(identityVersion, 'VSIX manifest has no Identity version');
          assert.equal(identityVersion[1], process.env.EXPECTED_VERSION);
          assert.match(vsixManifest, /<Icon>extension\/icon\.png<\/Icon>/);
          NODE

      - name: Upload VSIX artifact
        if: inputs.upload_artifact || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: vsix-package
          path: editors/vscode/codixing.vsix
          if-no-files-found: error
          retention-days: 14
