name: VSIX Package

on:
  release:
    types: [published]

jobs:
  vsix:
    name: Build VSIX
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Compile
        run: npm run compile

      - name: Package VSIX
        run: npm run package

      - name: Upload VSIX to release
        uses: softprops/action-gh-release@v2
        with:
          files: editors/vscode/codixing.vsix
