name: Release
on:
  push:
    tags:
      - 'v*'
  # Manual re-trigger for a tag whose automatic run failed or never fired.
  # The auto-tag workflow pushes tags with the default GITHUB_TOKEN, which
  # does NOT trigger this workflow (GitHub suppresses workflow-from-workflow
  # events) — and the git proxy used by remote agent sessions cannot delete
  # tags for the re-push workaround. Dispatch with the tag as the ref
  # (e.g. ref: v0.45.0) once ci.yml's release-build artifacts exist for the
  # tagged commit.
  workflow_dispatch:

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Download binaries built by ci.yml's release-build job on the same SHA.
      # Cross-workflow artifact fetch requires a third-party action — the
      # built-in actions/download-artifact only works inside a single run.
      # TODO(v0.37): pin to a SHA instead of the v6 tag for supply-chain hygiene.
      - name: Download release binaries from CI run on this SHA
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci.yml
          commit: ${{ github.sha }}
          name: binaries-
          name_is_regexp: true
          path: artifacts/
          if_no_artifact_found: fail
          check_artifacts: true

      - name: Flatten artifact directories
        shell: bash
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true

  npm-publish:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: cd npm && npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
