name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Exact tag to release (for example, v0.45.0)'
        required: false
        type: string

concurrency:
  # Serialize every version so two valid tags cannot race and move GitHub's
  # "Latest" marker backward.
  group: release-production
  cancel-in-progress: false

jobs:
  release:
    name: Verify and publish GitHub release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.rel.outputs.tag }}
      commit: ${{ steps.rel.outputs.commit }}
      published_by_run: ${{ steps.publish.outputs.published_by_run }}
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: https://registry.npmjs.org

      - name: Resolve and validate release tag
        id: rel
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          REQUESTED_TAG: ${{ inputs.tag }}
        run: |
          if [ -n "$REQUESTED_TAG" ]; then
            TAG="$REQUESTED_TAG"
          elif [ "$EVENT_NAME" = push ] && [ "$REF_TYPE" = tag ]; then
            TAG="$REF_NAME"
          else
            echo "ERROR: not a tag push and no tag input was provided"
            exit 1
          fi
          if [[ ! "$TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "ERROR: tag must be exact canonical semver vMAJOR.MINOR.PATCH"
            exit 1
          fi

          git fetch origin main --no-tags
          git fetch origin "+refs/tags/$TAG:refs/tags/$TAG" --no-tags
          COMMIT=$(git rev-list -n 1 "refs/tags/$TAG")
          if ! git merge-base --is-ancestor "$COMMIT" refs/remotes/origin/main; then
            echo "ERROR: $TAG commit $COMMIT is not on origin/main"
            exit 1
          fi

          SUBJECT=$(git log -1 --format=%s "$COMMIT")
          python3 - "$TAG" "$SUBJECT" <<'PY'
          import re
          import sys

          tag, subject = sys.argv[1:]
          match = re.fullmatch(
              r"release: (v(?:0|[1-9][0-9]*)\.(?:0|[1-9][0-9]*)\.(?:0|[1-9][0-9]*))(?: [—-] .+)?",
              subject,
          )
          if match is None:
              raise SystemExit("ERROR: tagged commit is not an exact release commit")
          if match.group(1) != tag:
              raise SystemExit(
                  f"ERROR: tag {tag} does not match release commit version {match.group(1)}"
              )
          PY

          git checkout --detach "$COMMIT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG at $COMMIT"

      - name: Enforce monotonic release ordering
        id: order
        shell: bash
        env:
          COMMIT: ${{ steps.rel.outputs.commit }}
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.rel.outputs.tag }}
        run: |
          RELEASES_FILE=$(mktemp)
          gh api --method GET --paginate --slurp \
            "repos/$GITHUB_REPOSITORY/releases" \
            -f per_page=100 > "$RELEASES_FILE"

          LATEST_TAG=$(gh api "repos/$GITHUB_REPOSITORY/releases/latest" \
            --jq .tag_name 2>/dev/null || true)
          ORDER=$(python3 scripts/release_order.py "$TAG" "$LATEST_TAG" "$RELEASES_FILE")
          RELATION=${ORDER%%|*}
          MAXIMUM_TAG=${ORDER#*|}

          case "$RELATION" in
            first|newer)
              git fetch origin main --no-tags
              CURRENT_MAIN=$(git rev-parse refs/remotes/origin/main)
              if [ "$COMMIT" != "$CURRENT_MAIN" ]; then
                echo "ERROR: new release $TAG points to $COMMIT, but current main is $CURRENT_MAIN"
                exit 1
              fi
              echo "$TAG is monotonic after ${MAXIMUM_TAG:-<no published release>} and points to current main."
              ;;
            same)
              IS_DRAFT=$(gh release view --repo "$GITHUB_REPOSITORY" "$TAG" --json isDraft --jq .isDraft)
              if [ "$IS_DRAFT" != false ]; then
                echo "ERROR: maximum published tag $TAG is not an existing published release"
                exit 1
              fi
              echo "$TAG is already the maximum published release; continuing idempotent verification."
              ;;
            older)
              echo "ERROR: refusing to release $TAG behind maximum published version $MAXIMUM_TAG"
              exit 1
              ;;
            *)
              echo "ERROR: unexpected release ordering result: $RELATION"
              exit 1
              ;;
          esac
          echo "relation=$RELATION" >> "$GITHUB_OUTPUT"
          echo "latest=$MAXIMUM_TAG" >> "$GITHUB_OUTPUT"

      - name: Verify version metadata and changelog at tagged commit
        shell: bash
        env:
          TAG: ${{ steps.rel.outputs.tag }}
        run: |
          EXPECTED_VERSION="${TAG#v}"
          python3 scripts/check_version_consistency.py "$EXPECTED_VERSION"
          EXPECTED_VERSION="$EXPECTED_VERSION" python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          expected = re.escape(os.environ["EXPECTED_VERSION"])
          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
          if re.search(rf"^## \[{expected}\](?:\s|$)", changelog, re.MULTILINE) is None:
              raise SystemExit(f"ERROR: CHANGELOG.md has no heading for {os.environ['EXPECTED_VERSION']}")
          PY

      - name: Require successful full CI on the tagged commit
        id: ci
        shell: bash
        env:
          COMMIT: ${{ steps.rel.outputs.commit }}
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID=$(gh api --method GET \
            "repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/runs" \
            -f head_sha="$COMMIT" \
            -f branch=main \
            -f event=push \
            -f status=completed \
            -f per_page=100 \
            --jq '.workflow_runs | map(select(.conclusion == "success")) | first | .id // empty')
          if [ -z "$RUN_ID" ]; then
            echo "ERROR: no successful completed CI run exists for tagged commit $COMMIT"
            exit 1
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "Using successful CI run $RUN_ID"

      - name: Download exact-commit release artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.ci.outputs.run_id }}
        run: |
          for artifact in \
            binaries-linux-x86_64 \
            binaries-macos-aarch64 \
            binaries-windows-x86_64 \
            vsix-package
          do
            gh run download "$RUN_ID" --name "$artifact" --dir "artifacts/$artifact"
          done

          mkdir -p release-assets
          cp artifacts/binaries-linux-x86_64/* release-assets/
          cp artifacts/binaries-macos-aarch64/* release-assets/
          cp artifacts/binaries-windows-x86_64/* release-assets/
          cp artifacts/vsix-package/codixing.vsix release-assets/

      - name: Verify local assets and generate checksums
        shell: bash
        env:
          TAG: ${{ steps.rel.outputs.tag }}
        run: |
          expected=()
          for suffix in linux-x86_64 macos-aarch64 windows-x86_64; do
            ext=""
            if [ "$suffix" = windows-x86_64 ]; then
              ext=.exe
            fi
            for bin in codixing codixing-mcp codixing-lsp codixing-server; do
              expected+=("${bin}-${suffix}${ext}")
            done
          done
          expected+=(codixing.vsix)

          for asset in "${expected[@]}"; do
            if [ ! -f "release-assets/$asset" ]; then
              echo "ERROR: missing release asset $asset"
              exit 1
            fi
          done
          shopt -s nullglob
          actual=(release-assets/*)
          if [ "${#actual[@]}" -ne "${#expected[@]}" ]; then
            echo "ERROR: expected ${#expected[@]} assets, found ${#actual[@]}"
            exit 1
          fi

          (
            cd release-assets
            printf '%s\n' "${expected[@]}" | LC_ALL=C sort | xargs sha256sum > SHA256SUMS
            sha256sum --check SHA256SUMS
          )

          chmod +x release-assets/codixing-linux-x86_64
          VERSION_OUTPUT=$(release-assets/codixing-linux-x86_64 --version)
          case "$VERSION_OUTPUT" in
            *"${TAG#v}"*) ;;
            *) echo "ERROR: Linux binary reports unexpected version: $VERSION_OUTPUT"; exit 1 ;;
          esac
          unzip -t release-assets/codixing.vsix >/dev/null

      - name: Smoke-test installer against staged release assets
        shell: bash
        env:
          TAG: ${{ steps.rel.outputs.tag }}
        run: |
          TRANSPORT_DIR=$(mktemp -d)
          INSTALL_DIR=$(mktemp -d)
          STAGED_RELEASE_DIR=$(pwd)/release-assets

          install -m 0755 /dev/stdin "$TRANSPORT_DIR/curl" <<'SH'
          #!/bin/sh
          set -eu

          destination=""
          url=""
          while [ "$#" -gt 0 ]; do
            case "$1" in
              --output)
                [ "$#" -ge 2 ] || exit 2
                destination=$2
                shift 2
                ;;
              --proto|--proto-redir|--connect-timeout|--max-time|--retry|--max-filesize)
                [ "$#" -ge 2 ] || exit 2
                shift 2
                ;;
              --fail|--silent|--show-error|--location)
                shift
                ;;
              https://*)
                [ -z "$url" ] || exit 2
                url=$1
                shift
                ;;
              *)
                echo "staged curl: unexpected argument: $1" >&2
                exit 2
                ;;
            esac
          done

          [ -n "$destination" ] && [ -n "$url" ] || exit 2
          prefix="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/"
          case "$url" in
            "$prefix"*) ;;
            *) echo "staged curl: unexpected URL: $url" >&2; exit 2 ;;
          esac
          asset=${url##*/}
          case "$asset" in
            SHA256SUMS|codixing-linux-x86_64|codixing-mcp-linux-x86_64|codixing-lsp-linux-x86_64|codixing-server-linux-x86_64) ;;
            *) echo "staged curl: unexpected asset: $asset" >&2; exit 2 ;;
          esac
          [ -f "$STAGED_RELEASE_DIR/$asset" ] || exit 2
          cp "$STAGED_RELEASE_DIR/$asset" "$destination"
          SH

          PATH="$TRANSPORT_DIR:$PATH" \
          STAGED_RELEASE_DIR="$STAGED_RELEASE_DIR" \
          CODIXING_VERSION="${TAG#v}" \
          CODIXING_INSTALL_DIR="$INSTALL_DIR" \
            sh docs/install.sh >/dev/null

          for bin in codixing codixing-mcp codixing-lsp codixing-server; do
            cmp "release-assets/${bin}-linux-x86_64" "$INSTALL_DIR/$bin"
            test -x "$INSTALL_DIR/$bin"
          done
          rm -rf "$TRANSPORT_DIR" "$INSTALL_DIR"

      - name: Preflight npm publication before making GitHub public
        shell: bash
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          TAG: ${{ steps.rel.outputs.tag }}
        run: |
          EXPECTED_VERSION="${TAG#v}"
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$PACKAGE_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "ERROR: npm package version $PACKAGE_VERSION does not match $TAG"
            exit 1
          fi

          npm view "$PACKAGE_NAME" versions --json > /tmp/npm-versions-preflight.json
          if EXPECTED_VERSION="$EXPECTED_VERSION" node - <<'NODE'
          const fs = require('fs');
          const expected = process.env.EXPECTED_VERSION;
          const parsed = JSON.parse(fs.readFileSync('/tmp/npm-versions-preflight.json', 'utf8'));
          const versions = Array.isArray(parsed) ? parsed : [parsed];
          process.exit(versions.includes(expected) ? 0 : 1);
          NODE
          then
            bash ../scripts/compare_npm_package.sh \
              . "$PACKAGE_NAME@$EXPECTED_VERSION"
          else
            npm whoami >/dev/null
            npm pack --dry-run --ignore-scripts
          fi

      - name: Create or update draft release
        id: draft
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.rel.outputs.tag }}
        run: |
          if IS_DRAFT=$(gh release view "$TAG" --json isDraft --jq .isDraft 2>/dev/null); then
            if [ "$IS_DRAFT" = true ]; then
              gh release upload "$TAG" release-assets/* --clobber
            else
              echo "$TAG is already published; verifying it without modifying assets."
            fi
          else
            gh release create "$TAG" release-assets/* \
              --draft \
              --generate-notes \
              --title "$TAG" \
              --verify-tag
            IS_DRAFT=true
          fi
          echo "is_draft=$IS_DRAFT" >> "$GITHUB_OUTPUT"

      - name: Verify uploaded release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.rel.outputs.tag }}
        run: |
          rm -rf downloaded-assets
          gh release download "$TAG" --dir downloaded-assets

          shopt -s nullglob
          local_assets=(release-assets/*)
          remote_assets=(downloaded-assets/*)
          if [ "${#local_assets[@]}" -ne "${#remote_assets[@]}" ]; then
            echo "ERROR: release has ${#remote_assets[@]} assets; expected ${#local_assets[@]}"
            exit 1
          fi
          for local_asset in "${local_assets[@]}"; do
            asset=${local_asset##*/}
            if [ ! -f "downloaded-assets/$asset" ]; then
              echo "ERROR: release is missing exact asset $asset"
              exit 1
            fi
            if ! cmp "$local_asset" "downloaded-assets/$asset"; then
              echo "ERROR: published asset $asset differs from the exact CI artifact"
              exit 1
            fi
          done
          (
            cd downloaded-assets
            sha256sum --check SHA256SUMS
          )

      - name: Publish verified draft
        id: publish
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          IS_DRAFT: ${{ steps.draft.outputs.is_draft }}
          RELATION: ${{ steps.order.outputs.relation }}
          TAG: ${{ steps.rel.outputs.tag }}
        run: |
          if [ "$IS_DRAFT" = true ]; then
            if [ "$RELATION" = same ]; then
              echo "ERROR: idempotent latest release unexpectedly became a draft"
              exit 1
            fi
            gh release edit "$TAG" --draft=false --latest
            echo "published_by_run=true" >> "$GITHUB_OUTPUT"
          else
            case "$RELATION" in
              first|newer)
                gh release edit "$TAG" --latest
                ;;
              same)
                echo "$TAG remains the current latest release."
                ;;
              *)
                echo "ERROR: refusing non-monotonic latest update for $TAG"
                exit 1
                ;;
            esac
            echo "published_by_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Smoke-test public checksums and installer
        shell: bash
        env:
          TAG: ${{ steps.rel.outputs.tag }}
        run: |
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          manifest=$(mktemp)
          ready=false
          for attempt in {1..12}; do
            if curl --fail --silent --show-error --location \
              "$base/SHA256SUMS" --output "$manifest"; then
              ready=true
              break
            fi
            sleep 5
          done
          if [ "$ready" != true ]; then
            echo "ERROR: published checksum manifest did not become available"
            exit 1
          fi
          cmp release-assets/SHA256SUMS "$manifest"
          test "$(wc -l < "$manifest")" -eq 13

          rm -rf /tmp/codixing-release-smoke
          CODIXING_VERSION="${TAG#v}" \
          CODIXING_INSTALL_DIR=/tmp/codixing-release-smoke \
            sh docs/install.sh >/dev/null
          /tmp/codixing-release-smoke/codixing --version | grep -F "${TAG#v}"

      - name: Restore draft visibility after a post-publish failure
        if: failure() && steps.publish.outputs.published_by_run == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.rel.outputs.tag }}
        run: gh release edit "$TAG" --draft --latest=false

  npm-publish:
    name: Publish exact version to npm
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.commit }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: https://registry.npmjs.org

      - name: Re-check package version and publish idempotently
        shell: bash
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          EXPECTED_VERSION="${TAG#v}"
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$PACKAGE_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "ERROR: npm package version $PACKAGE_VERSION does not match $TAG"
            exit 1
          fi

          npm view "$PACKAGE_NAME" versions --json > /tmp/npm-versions.json
          if EXPECTED_VERSION="$EXPECTED_VERSION" node - <<'NODE'
          const fs = require('fs');
          const expected = process.env.EXPECTED_VERSION;
          const parsed = JSON.parse(fs.readFileSync('/tmp/npm-versions.json', 'utf8'));
          const versions = Array.isArray(parsed) ? parsed : [parsed];
          process.exit(versions.includes(expected) ? 0 : 1);
          NODE
          then
            echo "$PACKAGE_NAME@$EXPECTED_VERSION is already published; skipping."
          else
            npm publish
          fi

          PUBLISHED_VERSION=""
          for attempt in {1..12}; do
            PUBLISHED_VERSION=$(npm view "$PACKAGE_NAME@$EXPECTED_VERSION" version 2>/dev/null || true)
            if [ "$PUBLISHED_VERSION" = "$EXPECTED_VERSION" ]; then
              break
            fi
            sleep 5
          done
          if [ "$PUBLISHED_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "ERROR: npm registry returned $PUBLISHED_VERSION after publish"
            exit 1
          fi
          bash ../scripts/compare_npm_package.sh \
            . "$PACKAGE_NAME@$EXPECTED_VERSION"

  pages-deploy:
    name: Deploy and verify release website
    needs: [release, npm-publish]
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch Pages at the released tag
        id: dispatch
        shell: bash
        env:
          COMMIT: ${{ needs.release.outputs.commit }}
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          PREVIOUS_RUN=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow pages.yml \
            --event workflow_dispatch \
            --commit "$COMMIT" \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId // empty')
          gh workflow run --repo "$GITHUB_REPOSITORY" pages.yml --ref "$TAG" -f "tag=$TAG"

          RUN_ID=""
          for attempt in {1..12}; do
            RUN_ID=$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow pages.yml \
              --event workflow_dispatch \
              --commit "$COMMIT" \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // empty')
            if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "$PREVIOUS_RUN" ]; then
              break
            fi
            RUN_ID=""
            sleep 5
          done
          if [ -z "$RUN_ID" ]; then
            echo "ERROR: could not identify the dispatched Pages run"
            exit 1
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for Pages deployment
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.dispatch.outputs.run_id }}
        run: gh run watch --repo "$GITHUB_REPOSITORY" "$RUN_ID" --exit-status
