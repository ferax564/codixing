name: Release
on:
  push:
    tags:
      - 'v*'
  # Manual re-trigger for a tag whose automatic run failed or never fired.
  # The auto-tag workflow pushes tags with the default GITHUB_TOKEN, which
  # does NOT trigger this workflow (GitHub suppresses workflow-from-workflow
  # events) — and the git proxy used by remote agent sessions cannot delete
  # tags for the re-push workaround. Dispatch from main with the tag name
  # as input once ci.yml's release-build artifacts exist for the tagged
  # commit (dispatching on the tag ref itself only works for tags created
  # after this trigger landed, because GitHub validates the trigger in the
  # workflow file at the dispatched ref).
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.45.0); required when the dispatch ref is not the tag'
        required: false
        type: string

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Resolve the release tag and its commit. On a tag push these match
      # github.ref/github.sha; on a manual dispatch the tag comes from the
      # input and the commit is resolved from the tag, so artifacts are
      # fetched for the *tagged* commit, not the dispatch ref's head.
      - name: Resolve release tag and commit
        id: rel
        shell: bash
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            echo "ERROR: not a tag push and no tag input provided"
            exit 1
          fi
          git fetch origin "refs/tags/$TAG:refs/tags/$TAG" --no-tags --force
          COMMIT=$(git rev-list -n 1 "$TAG")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG at $COMMIT"

      # Download binaries built by ci.yml's release-build job on the tagged SHA.
      # Cross-workflow artifact fetch requires a third-party action — the
      # built-in actions/download-artifact only works inside a single run.
      # TODO(v0.37): pin to a SHA instead of the v6 tag for supply-chain hygiene.
      - name: Download release binaries from CI run on this SHA
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci.yml
          commit: ${{ steps.rel.outputs.commit }}
          name: binaries-
          name_is_regexp: true
          path: artifacts/
          if_no_artifact_found: fail
          check_artifacts: true

      - name: Flatten artifact directories
        shell: bash
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          files: release-assets/*
          generate_release_notes: true

  npm-publish:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: cd npm && npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
