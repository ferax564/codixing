name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_suffix: linux-x86_64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_suffix: macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_suffix: macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_suffix: windows-x86_64
            exe_suffix: .exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install system deps (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang

      - name: Build release binaries
        run: cargo build --release --workspace
        env:
          CARGO_BUILD_TARGET: ${{ matrix.target }}

      - name: Stage binaries (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p staging
          cp target/release/codeforge staging/codeforge-${{ matrix.artifact_suffix }}
          cp target/release/codeforge-mcp staging/codeforge-mcp-${{ matrix.artifact_suffix }}
          cp target/release/codeforge-server staging/codeforge-server-${{ matrix.artifact_suffix }}

      - name: Stage binaries (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item target\release\codeforge.exe staging\codeforge-${{ matrix.artifact_suffix }}.exe
          Copy-Item target\release\codeforge-mcp.exe staging\codeforge-mcp-${{ matrix.artifact_suffix }}.exe
          Copy-Item target\release\codeforge-server.exe staging\codeforge-server-${{ matrix.artifact_suffix }}.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.artifact_suffix }}
          path: staging/

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
