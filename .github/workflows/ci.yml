name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly 100K-file claim run. Main pushes and pull requests use 10K as a
    # regression/scale surrogate, while the short profile remains a smoke run.
    - cron: "17 3 * * 0"
  workflow_dispatch:
    inputs:
      large_repo_profile:
        description: End-to-end large-repository benchmark scale
        required: true
        default: 10k
        type: choice
        options:
          - pr
          - 10k
          - 100k
      baseline_quality_json:
        description: Raw commit-bound baseline quality JSON for a manual 100K run
        required: false
        type: string
      candidate_quality_json:
        description: Raw commit-bound candidate quality JSON for a manual 100K run
        required: false
        type: string

# Cancel superseded PR/main CI runs so agents iterating on a branch do not
# burn the full matrix for every intermediate push.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files (no duplicate keys)
        shell: bash
        run: |
          python3 - <<'EOF'
          import json, sys, pathlib

          def check_no_dups(path):
              text = pathlib.Path(path).read_text()
              def hook(p):
                  seen = {}
                  dups = []
                  for k, _ in p:
                      if k in seen:
                          dups.append(k)
                      seen[k] = True
                  if dups:
                      raise ValueError(f"{path}: duplicate JSON keys: {dups}")
                  return seen
              json.loads(text, object_pairs_hook=hook)
              print(f"OK: {path}")

          for p in [
              ".claude-plugin/marketplace.json",
              "claude-plugin/.claude-plugin/plugin.json",
              "npm/package.json",
          ]:
              check_no_dups(p)
          EOF

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust
          shared-key: ${{ matrix.os }}

      - name: Install system deps (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang

      # `cargo test` already builds the workspace; a separate debug build step
      # was pure wall-clock overhead (~minutes per OS) without extra coverage.
      - name: Test
        if: matrix.os != 'windows-latest'
        run: cargo test --workspace

      - name: Test (Windows, no usearch)
        if: matrix.os == 'windows-latest'
        run: cargo test --workspace --no-default-features

      - name: Clippy
        if: matrix.os != 'windows-latest'
        # Rust 1.97 added collapsible_if findings across 98 existing sites.
        # Keep correctness lints strict without coupling a rolling-stable CI
        # update to unrelated mass style churn.
        run: cargo clippy --workspace --all-targets -- -D warnings -A clippy::collapsible_if

      - name: Format check
        run: cargo fmt --check

      - name: README ↔ CLI subcommand drift check
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          cargo build --release -p codixing
          scripts/check_readme_commands.sh ./target/release/codixing

      - name: Self-audit (index integrity on this repo)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: scripts/self_audit.sh ./target/release/codixing

  vscode:
    name: VS Code Extension
    permissions:
      contents: read
    uses: ./.github/workflows/vsix.yml
    with:
      upload_artifact: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

  msrv:
    name: Minimum Rust 1.88
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-msrv
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang
      - name: Check workspace at declared MSRV
        run: cargo check --workspace --all-targets --no-default-features

  npm-installer:
    name: npm Installer
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Verify release metadata and version transaction
        working-directory: .
        run: |
          python3 scripts/check_version_consistency.py
          python3 scripts/test_version_scripts.py
          python3 scripts/test_release_order.py
      - name: Test downloader and process forwarding
        run: npm test
      - name: Verify package contents
        run: npm pack --dry-run --ignore-scripts
      - name: Test exact npm package comparison
        working-directory: .
        run: bash scripts/test_compare_npm_package.sh
      - name: Test checksum-verified shell installer
        run: cd .. && scripts/test_install.sh

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run audit
        # Ignore advisories for transitive deps we cannot fix without upstream changes.
        # See audit.toml for full justification of each ignore.
        run: >-
          cargo audit
          --ignore RUSTSEC-2026-0009
          --ignore RUSTSEC-2025-0119
          --ignore RUSTSEC-2024-0436
          --ignore RUSTSEC-2025-0134
          --ignore RUSTSEC-2026-0002
          --ignore RUSTSEC-2026-0098
          --ignore RUSTSEC-2026-0099

  coverage:
    name: Code coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  release-build:
    name: Build release (${{ matrix.artifact_suffix }})
    needs: [test, npm-installer]
    # Only build release binaries on main pushes — PRs stay fast. release.yml
    # downloads these artifacts by tagged commit SHA after this job completes.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_suffix: linux-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_suffix: macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_suffix: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust
          # Separate key from the test cache so builds don't thrash each other.
          key: release-${{ matrix.target }}

      - name: Install system deps (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang

      - name: Build release binaries (Unix)
        if: runner.os != 'Windows'
        run: cargo build --release --workspace --target ${{ matrix.target }}
        env:
          RUSTFLAGS: "--remap-path-prefix=$HOME/=/build/"

      - name: Build release binaries (Windows, no-default-features)
        if: runner.os == 'Windows'
        run: cargo build --release --workspace --no-default-features --target ${{ matrix.target }}
        env:
          RUSTFLAGS: "--remap-path-prefix=$HOME/=/build/"

      - name: Stage binaries
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          SUFFIX: ${{ matrix.artifact_suffix }}
          RUNNER_OS: ${{ runner.os }}
        run: |
          mkdir -p staging
          ext=""
          if [ "$RUNNER_OS" = "Windows" ]; then
            ext=".exe"
          fi
          for bin in codixing codixing-mcp codixing-lsp codixing-server; do
            cp "target/${TARGET}/release/${bin}${ext}" \
               "staging/${bin}-${SUFFIX}${ext}"
          done

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.artifact_suffix }}
          path: staging/*
          retention-days: 14

  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust
          shared-key: ubuntu-latest
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang

      - name: Build benchmark binaries
        run: cargo build --release -p codixing -p codixing-server

      - name: Build pinned large-repository baseline
        if: github.event_name != 'workflow_dispatch' || inputs.large_repo_profile != 'pr'
        shell: bash
        run: |
          while IFS='=' read -r name _; do
            if [[ "${name^^}" == GIT_* ]]; then
              unset "$name"
            fi
          done < <(env)
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main

          resolve_trusted_baseline_ref() {
            local trusted_ref="$1"
            local pin_state="$2"
            local pin_value="${3:-}"
            local candidate
            if [[ "$pin_state" == "present" ]]; then
              candidate="$(printf '%s' "$pin_value" | tr -d '[:space:]')"
            elif [[ "$pin_state" == "missing" ]]; then
              candidate="$(git rev-parse "$trusted_ref")"
            else
              echo "invalid trusted baseline pin state: $pin_state" >&2
              return 1
            fi
            if [[ ! "$candidate" =~ ^[0-9a-f]{40}$ ]]; then
              echo "trusted baseline revision is not a full SHA-1" >&2
              return 1
            fi
            git cat-file -e "${candidate}^{commit}"
            if ! git merge-base --is-ancestor "$candidate" "$trusted_ref"; then
              echo "trusted baseline revision is not reachable from $trusted_ref" >&2
              return 1
            fi
            printf '%s\n' "$candidate"
          }

          if pin_value="$(git show origin/main:benchmarks/large_repo_baseline_ref.txt 2>/dev/null)"; then
            pin_state="present"
          else
            pin_state="missing"
            pin_value=""
          fi
          baseline_ref="$(resolve_trusted_baseline_ref origin/main "$pin_state" "$pin_value")"

          # Exercise both bootstrap paths on every run. PRs created before the
          # pin lands use origin/main itself; after merge, the trusted main pin
          # must resolve to a commit reachable from that same protected ref.
          trusted_main="$(git rev-parse origin/main)"
          bootstrap_ref="$(resolve_trusted_baseline_ref origin/main missing)"
          test "$bootstrap_ref" = "$trusted_main"
          pinned_ref="$(resolve_trusted_baseline_ref origin/main present "$baseline_ref")"
          test "$pinned_ref" = "$baseline_ref"

          echo "$baseline_ref" > "$RUNNER_TEMP/codixing-trusted-baseline-ref"
          git worktree add --detach "$RUNNER_TEMP/codixing-baseline" "$baseline_ref"
          python3 benchmarks/large_repo_gate.py \
            --bootstrap-legacy-build \
            --source-root "$RUNNER_TEMP/codixing-baseline" \
            --legacy-build-target "$RUNNER_TEMP/codixing-baseline-target" \
            --legacy-build-provenance \
              "$RUNNER_TEMP/codixing-baseline-build-provenance.json"

      - name: Test large-repository gate
        run: python3 benchmarks/test_large_repo_gate.py

      - name: Select large-repository profile
        id: large-repo-profile
        env:
          REQUESTED_PROFILE: ${{ inputs.large_repo_profile }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          profile="$REQUESTED_PROFILE"
          if [[ -z "$profile" ]]; then
            case "$EVENT_NAME" in
              pull_request) profile="10k" ;;
              schedule) profile="100k" ;;
              *) profile="10k" ;;
            esac
          fi
          case "$profile" in
            pr)
              speed_limit=""
              rss_limit=""
              one_file_delta_ms=""
              evidence_mode="smoke"
              baseline_mode="smoke"
              ;;
            10k)
              speed_limit="0.80"
              rss_limit="0.75"
              one_file_delta_ms="100"
              evidence_mode="regression"
              baseline_mode="regression"
              ;;
            100k)
              speed_limit="0.50"
              rss_limit="0.50"
              one_file_delta_ms="500"
              evidence_mode="strict-claim"
              baseline_mode="claim-baseline"
              ;;
            *)
              echo "unsupported large-repository profile: $profile" >&2
              exit 1
              ;;
          esac
          {
            echo "profile=$profile"
            echo "speed_limit=$speed_limit"
            echo "rss_limit=$rss_limit"
            echo "one_file_delta_ms=$one_file_delta_ms"
            echo "evidence_mode=$evidence_mode"
            echo "baseline_mode=$baseline_mode"
          } >> "$GITHUB_OUTPUT"

      - name: Validate strict-claim evidence inputs
        id: large-repo-claim
        if: steps.large-repo-profile.outputs.evidence_mode == 'strict-claim'
        env:
          EVENT_NAME: ${{ github.event_name }}
          CANDIDATE_REVISION: ${{ github.sha }}
          MANUAL_BASELINE_QUALITY_JSON: ${{ inputs.baseline_quality_json }}
          MANUAL_CANDIDATE_QUALITY_JSON: ${{ inputs.candidate_quality_json }}
          SCHEDULED_BASELINE_QUALITY_JSON: ${{ vars.LARGE_REPO_BASELINE_QUALITY_JSON }}
          SCHEDULED_CANDIDATE_QUALITY_JSON: ${{ vars.LARGE_REPO_CANDIDATE_QUALITY_JSON }}
        shell: bash
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            baseline_quality_json="$MANUAL_BASELINE_QUALITY_JSON"
            candidate_quality_json="$MANUAL_CANDIDATE_QUALITY_JSON"
          elif [[ "$EVENT_NAME" == "schedule" ]]; then
            baseline_quality_json="$SCHEDULED_BASELINE_QUALITY_JSON"
            candidate_quality_json="$SCHEDULED_CANDIDATE_QUALITY_JSON"
          else
            echo "strict claims require a scheduled or manual 100K run" >&2
            exit 1
          fi
          if [[ -z "$baseline_quality_json" ]]; then
            echo "100K claims require raw baseline quality JSON" >&2
            exit 1
          fi
          if [[ -z "$candidate_quality_json" ]]; then
            echo "100K claims require raw candidate quality JSON" >&2
            exit 1
          fi
          baseline_quality_path="$RUNNER_TEMP/large-repo-baseline-quality.json"
          candidate_quality_path="$RUNNER_TEMP/large-repo-candidate-quality.json"
          printf '%s' "$baseline_quality_json" > "$baseline_quality_path"
          printf '%s' "$candidate_quality_json" > "$candidate_quality_path"
          python3 -m json.tool "$baseline_quality_path" >/dev/null
          python3 -m json.tool "$candidate_quality_path" >/dev/null
          {
            echo "baseline_quality=$baseline_quality_path"
            echo "candidate_quality=$candidate_quality_path"
            echo "baseline_revision=$(<"$RUNNER_TEMP/codixing-trusted-baseline-ref")"
            echo "candidate_revision=$CANDIDATE_REVISION"
          } >> "$GITHUB_OUTPUT"

      - name: Measure pinned baseline on this runner
        if: steps.large-repo-profile.outputs.profile != 'pr'
        run: |
          claim_args=()
          if [[ "${{ steps.large-repo-profile.outputs.baseline_mode }}" == "claim-baseline" ]]; then
            claim_args=(
              --external-quality-result "${{ steps.large-repo-claim.outputs.baseline_quality }}"
              --expected-current-revision "${{ steps.large-repo-claim.outputs.baseline_revision }}"
            )
          fi
          # One automatic retry: pinned pre-v2 baselines remain process-noisy on
          # shared runners; a second capture is cheaper than a full job re-run.
          attempt=1
          while true; do
            if python3 benchmarks/large_repo_gate.py \
              --profile "${{ steps.large-repo-profile.outputs.profile }}" \
              --evidence-mode "${{ steps.large-repo-profile.outputs.baseline_mode }}" \
              --threads 8 \
              --codixing "$RUNNER_TEMP/codixing-baseline-target/release/codixing" \
              --server "$RUNNER_TEMP/codixing-baseline-target/release/codixing-server" \
              --source-root "$RUNNER_TEMP/codixing-baseline" \
              --legacy-build-provenance \
                "$RUNNER_TEMP/codixing-baseline-build-provenance.json" \
              --work-dir "$RUNNER_TEMP/codixing-large-repo-work" \
              "${claim_args[@]}" \
              --output "$RUNNER_TEMP/large-repo-baseline.json"; then
              break
            fi
            if [[ "$attempt" -ge 2 ]]; then
              exit 1
            fi
            echo "baseline measurement failed on attempt $attempt; retrying once" >&2
            attempt=$((attempt + 1))
            rm -f "$RUNNER_TEMP/large-repo-baseline.json"
          done

      - name: Run end-to-end large-repository acceptance gate
        if: steps.large-repo-profile.outputs.profile != 'pr'
        run: |
          claim_args=()
          if [[ "${{ steps.large-repo-profile.outputs.evidence_mode }}" == "strict-claim" ]]; then
            claim_args=(
              --external-quality-result "${{ steps.large-repo-claim.outputs.candidate_quality }}"
              --expected-current-revision "${{ steps.large-repo-claim.outputs.candidate_revision }}"
              --expected-baseline-revision "${{ steps.large-repo-claim.outputs.baseline_revision }}"
            )
          fi
          python3 benchmarks/large_repo_gate.py \
            --profile "${{ steps.large-repo-profile.outputs.profile }}" \
            --evidence-mode "${{ steps.large-repo-profile.outputs.evidence_mode }}" \
            --threads 8 \
            --codixing target/release/codixing \
            --server target/release/codixing-server \
            --baseline "$RUNNER_TEMP/large-repo-baseline.json" \
            --work-dir "$RUNNER_TEMP/codixing-large-repo-work" \
            "${claim_args[@]}" \
            --max-init-ratio 1.05 \
            --max-rss-ratio "${{ steps.large-repo-profile.outputs.rss_limit }}" \
            --max-resident-rss-ratio "${{ steps.large-repo-profile.outputs.rss_limit }}" \
            --max-disk-ratio 0.50 \
            --max-post-sync-disk-ratio 0.50 \
            --max-cold-query-p95-ratio 1.05 \
            --max-cold-query-rss-ratio "${{ steps.large-repo-profile.outputs.rss_limit }}" \
            --max-warm-query-p95-ratio 0.50 \
            --warm-query-absolute-floor-ms 10 \
            --max-warm-query-regression-ms 2 \
            --max-speed-suite-ratio "${{ steps.large-repo-profile.outputs.speed_limit }}" \
            --max-speed-component-ratio 1.05 \
            --max-one-file-sync-ratio "${{ steps.large-repo-profile.outputs.speed_limit }}" \
            --max-one-file-sync-regression-ms "${{ steps.large-repo-profile.outputs.one_file_delta_ms }}" \
            --max-one-file-sync-rss-ratio "${{ steps.large-repo-profile.outputs.rss_limit }}" \
            --max-one-file-rewrite-ratio 0.50 \
            --max-one-percent-sync-ratio 1.05 \
            --max-one-percent-sync-rss-ratio "${{ steps.large-repo-profile.outputs.rss_limit }}" \
            --max-one-percent-rewrite-ratio 0.50 \
            --max-no-op-rewrite-bytes 0 \
            --min-quality-ratio 0.99 \
            --min-recall-at-10-ratio 0.99 \
            --min-quality-mrr 0.80 \
            --min-quality-recall-at-10 0.90 \
            --output "$RUNNER_TEMP/large-repo-gate.json"

      - name: Run end-to-end large-repository smoke profile
        if: steps.large-repo-profile.outputs.profile == 'pr'
        run: |
          python3 benchmarks/large_repo_gate.py \
            --profile pr \
            --evidence-mode smoke \
            --threads 8 \
            --codixing target/release/codixing \
            --server target/release/codixing-server \
            --work-dir "$RUNNER_TEMP/codixing-large-repo-work" \
            --output "$RUNNER_TEMP/large-repo-gate.json"

      - name: Run Criterion benchmarks
        shell: bash
        run: |
          set -o pipefail
          cargo bench -p codixing-core \
            --bench search_bench \
            --bench large_repo_bench \
            --bench vector_bench \
            2>&1 | tee criterion-results.txt

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            criterion-results.txt
            ${{ runner.temp }}/large-repo-baseline.json
            ${{ runner.temp }}/large-repo-gate.json
            ${{ runner.temp }}/large-repo-baseline-quality.json
            ${{ runner.temp }}/large-repo-candidate-quality.json
            ${{ runner.temp }}/codixing-baseline-build-provenance.json
          if-no-files-found: warn
          retention-days: 14
