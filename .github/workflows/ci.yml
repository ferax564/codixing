name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files (no duplicate keys)
        shell: bash
        run: |
          python3 - <<'EOF'
          import json, sys, pathlib

          def check_no_dups(path):
              text = pathlib.Path(path).read_text()
              def hook(p):
                  seen = {}
                  dups = []
                  for k, _ in p:
                      if k in seen:
                          dups.append(k)
                      seen[k] = True
                  if dups:
                      raise ValueError(f"{path}: duplicate JSON keys: {dups}")
                  return seen
              json.loads(text, object_pairs_hook=hook)
              print(f"OK: {path}")

          for p in [
              ".claude-plugin/marketplace.json",
              "claude-plugin/.claude-plugin/plugin.json",
              "npm/package.json",
          ]:
              check_no_dups(p)
          EOF

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.os }}

      - name: Install system deps (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang

      - name: Build
        if: matrix.os != 'windows-latest'
        run: cargo build --workspace

      - name: Build (Windows, no usearch)
        if: matrix.os == 'windows-latest'
        run: cargo build --workspace --no-default-features

      - name: Test
        if: matrix.os != 'windows-latest'
        run: cargo test --workspace

      - name: Test (Windows, no usearch)
        if: matrix.os == 'windows-latest'
        run: cargo test --workspace --no-default-features

      - name: Clippy
        if: matrix.os != 'windows-latest'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Format check
        run: cargo fmt --check

  vscode:
    name: VS Code Extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Compile extension
        run: npm run compile

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run audit
        # Ignore advisories for transitive deps we cannot fix without upstream changes.
        # See audit.toml for full justification of each ignore.
        run: >-
          cargo audit
          --ignore RUSTSEC-2026-0009
          --ignore RUSTSEC-2025-0119
          --ignore RUSTSEC-2024-0436
          --ignore RUSTSEC-2025-0134
          --ignore RUSTSEC-2026-0002

  coverage:
    name: Code coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  release-build:
    name: Build release (${{ matrix.artifact_suffix }})
    needs: test
    # Only build release binaries on main pushes and tag pushes — PRs stay
    # fast. release.yml downloads these artifacts by commit SHA on tag push.
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_suffix: linux-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_suffix: macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_suffix: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          # Separate key from the test cache so builds don't thrash each other.
          key: release-${{ matrix.target }}

      - name: Install system deps (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang

      - name: Build release binaries (Unix)
        if: runner.os != 'Windows'
        run: cargo build --release --workspace --target ${{ matrix.target }}
        env:
          RUSTFLAGS: "--remap-path-prefix=$HOME/=/build/"

      - name: Build release binaries (Windows, no-default-features)
        if: runner.os == 'Windows'
        run: cargo build --release --workspace --no-default-features --target ${{ matrix.target }}
        env:
          RUSTFLAGS: "--remap-path-prefix=$HOME/=/build/"

      - name: Stage binaries
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          SUFFIX: ${{ matrix.artifact_suffix }}
          RUNNER_OS: ${{ runner.os }}
        run: |
          mkdir -p staging
          ext=""
          if [ "$RUNNER_OS" = "Windows" ]; then
            ext=".exe"
          fi
          for bin in codixing codixing-mcp codixing-lsp; do
            cp "target/${TARGET}/release/${bin}${ext}" \
               "staging/${bin}-${SUFFIX}${ext}"
          done

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.artifact_suffix }}
          path: staging/*
          retention-days: 14

  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-latest
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang
      - name: Run benchmarks
        run: cargo bench --workspace -- --output-format bencher 2>&1 | tee bench-results.txt
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: bench-results.txt
