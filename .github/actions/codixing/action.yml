name: 'Codixing Impact Analysis'
description: 'Bounded dependency-impact analysis for pull requests'
branding:
  icon: 'search'
  color: 'blue'

inputs:
  version:
    description: 'Codixing version to install (latest release when omitted)'
    required: false
    default: ''
  github-token:
    description: 'GitHub token for posting PR comments'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Install Codixing
      shell: bash
      env:
        CODIXING_VERSION_INPUT: ${{ inputs.version }}
      run: |
        INSTALL_DIR="$RUNNER_TEMP/codixing-bin"
        if [ -z "${GITHUB_ACTION_PATH:-}" ]; then
          echo "ERROR: GITHUB_ACTION_PATH is unavailable" >&2
          exit 1
        fi
        SNAPSHOT_ROOT=$(cd "$GITHUB_ACTION_PATH/../../.." && pwd -P)
        INSTALLER="$GITHUB_ACTION_PATH/../../../docs/install.sh"
        INSTALLER_DIR=$(cd "$(dirname "$INSTALLER")" && pwd -P)
        INSTALLER_PATH="$INSTALLER_DIR/$(basename "$INSTALLER")"
        if [ "$INSTALLER_PATH" != "$SNAPSHOT_ROOT/docs/install.sh" ] \
            || [ ! -f "$INSTALLER_PATH" ] \
            || [ ! -r "$INSTALLER_PATH" ] \
            || [ -L "$INSTALLER_PATH" ]; then
          echo "ERROR: action snapshot installer is missing or unsafe: $INSTALLER_PATH" >&2
          exit 1
        fi
        export CODIXING_INSTALL_DIR="$INSTALL_DIR"
        if [ -n "$CODIXING_VERSION_INPUT" ]; then
          export CODIXING_VERSION="$CODIXING_VERSION_INPUT"
        fi
        sh "$INSTALLER_PATH"
        echo "$INSTALL_DIR" >> "$GITHUB_PATH"

    - name: Index codebase
      shell: bash
      run: codixing init .

    - name: Analyze PR impact
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        IMPACT_FILE="$RUNNER_TEMP/codixing-impact.md"
        BODY_FILE="$RUNNER_TEMP/codixing-comment.md"
        FILES_FILE="$RUNNER_TEMP/codixing-files.txt"
        RESULT_FILE="$RUNNER_TEMP/codixing-result.txt"
        MAX_FILES=20
        MAX_RESULT_BYTES=2200
        : > "$IMPACT_FILE"

        if [ -z "$PR_NUMBER" ]; then
          echo "ERROR: this action requires a pull_request event" >&2
          exit 1
        fi
        if ! gh pr diff "$PR_NUMBER" --name-only > "$FILES_FILE"; then
          echo "ERROR: could not retrieve the pull request file list" >&2
          exit 1
        fi
        TOTAL_FILES=$(awk 'NF { count++ } END { print count + 0 }' "$FILES_FILE")
        PROCESSED=0

        while IFS= read -r file; do
          [ -n "$file" ] || continue
          if [ "$PROCESSED" -ge "$MAX_FILES" ]; then
            break
          fi
          PROCESSED=$((PROCESSED + 1))
          if ! codixing impact "$file" > "$RESULT_FILE" 2>&1; then
            printf '%s\n' \
              'Impact unavailable (the file may be deleted or outside the index).' \
              > "$RESULT_FILE"
          fi

          {
            printf '### File %s\n\n' "$PROCESSED"
            printf '    %.300s\n\n' "$file"
          } >> "$IMPACT_FILE"
          python3 - "$RESULT_FILE" "$MAX_RESULT_BYTES" >> "$IMPACT_FILE" <<'PY'
        import pathlib
        import sys

        raw = pathlib.Path(sys.argv[1]).read_bytes()
        limit = int(sys.argv[2])
        truncated = len(raw) > limit
        text = raw[:limit].decode("utf-8", errors="ignore").rstrip()
        for line in text.splitlines() or [""]:
            print(f"    {line}")
        if truncated:
            print("    ... impact output truncated by the PR comment budget ...")
        print()
        PY
        done < "$FILES_FILE"

        OMITTED=$((TOTAL_FILES - PROCESSED))

        {
          printf '## Codixing Impact Analysis\n\n'
          cat "$IMPACT_FILE"
          if [ "$OMITTED" -gt 0 ]; then
            printf '_%s additional changed files omitted to keep this comment bounded._\n\n' "$OMITTED"
          fi
          printf '%s\n' '---' '*Generated by [Codixing](https://codixing.com)*'
        } > "$BODY_FILE"

        if [ "$(wc -c < "$BODY_FILE")" -gt 55000 ]; then
          echo "ERROR: bounded impact comment unexpectedly exceeded 55 KiB" >&2
          exit 1
        fi

        gh pr comment "$PR_NUMBER" --body-file "$BODY_FILE"
