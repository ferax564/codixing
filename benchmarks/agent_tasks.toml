# TOKIO (~100K lines Rust)
# ═══════════════════════════════════════════════════════════════════════

[[agent_task]]
repo = "tokio"
id = "agent-tokio-1"
category = "symbol_lookup"
prompt = "Find the definition of the Runtime struct in tokio. Show me its fields."
acceptance = { contains = ["Runtime", "runtime"] }

[[agent_task]]
repo = "tokio"
id = "agent-tokio-2"
category = "code_understanding"
prompt = "How does task spawning work in tokio? Trace from spawn() through the scheduler to actual execution."
acceptance = { contains = ["spawn", "task"] }

[[agent_task]]
repo = "tokio"
id = "agent-tokio-3"
category = "call_graph"
prompt = "Find all callers of JoinHandle::abort. What code paths lead to task cancellation?"
acceptance = { contains = ["abort", "JoinHandle"] }

