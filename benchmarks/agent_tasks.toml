# Agent benchmark tasks — natural language prompts for real Claude agent sessions
# Categories: symbol_lookup, code_understanding, call_graph, impact_analysis, architecture

# ═══════════════════════════════════════════════════════════════════════
# CODIXING (self, ~15K lines Rust)
# ═══════════════════════════════════════════════════════════════════════

[[agent_task]]
repo = "codixing"
id = "agent-codixing-1"
category = "symbol_lookup"
prompt = "Find where the Engine struct is defined and show me its fields and methods."
acceptance = { contains = ["pub struct Engine", "engine"] }

[[agent_task]]
repo = "codixing"
id = "agent-codixing-2"
category = "call_graph"
prompt = "What functions call symbol_callers in the codebase? List all call sites with file paths."
acceptance = { contains = ["symbol_callers"] }

[[agent_task]]
repo = "codixing"
id = "agent-codixing-3"
category = "code_understanding"
prompt = "Explain how the search pipeline works: what happens when a user calls code_search? Trace from the MCP tool handler through to the engine."
acceptance = { contains = ["search", "engine"] }

[[agent_task]]
repo = "codixing"
id = "agent-codixing-4"
category = "impact_analysis"
prompt = "If I changed the SearchResult struct, what files and functions would be affected?"
acceptance = { contains = ["SearchResult"] }

