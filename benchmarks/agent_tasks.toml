# BEVY (~500K lines Rust)
# ═══════════════════════════════════════════════════════════════════════

[[agent_task]]
repo = "bevy"
id = "agent-bevy-1"
category = "symbol_lookup"
prompt = "Find where the Query struct is defined in Bevy ECS. Show its type parameters and key methods."
acceptance = { contains = ["Query", "bevy_ecs"] }

[[agent_task]]
repo = "bevy"
id = "agent-bevy-2"
category = "call_graph"
prompt = "What systems or functions call Query::get in the Bevy codebase? List all call sites."
acceptance = { contains = ["Query", "get"] }

[[agent_task]]
repo = "bevy"
id = "agent-bevy-3"
category = "architecture"
prompt = "Give me an overview of Bevy's module structure. What are the main crates and what does each do?"
acceptance = { contains = ["bevy_ecs", "bevy_app"] }

[[agent_task]]
repo = "bevy"
id = "agent-bevy-4"
category = "impact_analysis"
prompt = "If I changed the signature of App::add_systems, what would break? List all affected files."
acceptance = { contains = ["App", "add_systems"] }

