# Queue Embedding v2 — OpenClaw benchmark queries
#
# 20 curated queries with verified ground truth, across 4 categories:
#   - symbol (5): find specific type/interface/class definitions
#   - usage (5): find where a function/type is used/called
#   - concept (5): semantic search for concepts
#   - cross-package (5): find files that import from specific packages
#
# All ground_truth paths are relative to the OpenClaw repo root and have been
# verified to exist and contain the expected content.

# ──────────────────────────────────────────────────────────────────────────────
# SYMBOL queries — find where a type/interface/class is defined
# ──────────────────────────────────────────────────────────────────────────────

[[query]]
name = "symbol-channel-plugin"
text = "ChannelPlugin type definition"
grep_pattern = "ChannelPlugin"
category = "symbol"
ground_truth = [
  "src/channels/plugins/types.plugin.ts",
]

[[query]]
name = "symbol-gateway-server"
text = "GatewayServer type definition"
grep_pattern = "GatewayServer"
category = "symbol"
ground_truth = [
  "src/gateway/server.impl.ts",
]

[[query]]
name = "symbol-context-engine-interface"
text = "ContextEngine interface definition"
grep_pattern = "ContextEngine"
category = "symbol"
ground_truth = [
  "src/context-engine/types.ts",
]

[[query]]
name = "symbol-openclaw-config"
text = "OpenClawConfig type definition"
grep_pattern = "OpenClawConfig"
category = "symbol"
ground_truth = [
  "src/config/types.openclaw.ts",
]

[[query]]
name = "symbol-tool-policy-like"
text = "ToolPolicyLike type definition"
grep_pattern = "ToolPolicyLike"
category = "symbol"
ground_truth = [
  "src/agents/tool-policy.ts",
]

