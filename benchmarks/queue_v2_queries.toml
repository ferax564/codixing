# ──────────────────────────────────────────────────────────────────────────────
# CONCEPT queries — semantic search for high-level concepts
# ──────────────────────────────────────────────────────────────────────────────

[[query]]
name = "concept-security-audit"
text = "security audit and filesystem permission checks"
grep_pattern = "audit"
category = "concept"
ground_truth = [
  "src/security/audit.runtime.ts",
  "src/security/audit.ts",
  "src/security/audit-fs.ts",
  "src/security/audit-tool-policy.ts",
]

[[query]]
name = "concept-rate-limiting"
text = "rate limiting and throttling implementation"
grep_pattern = 'rateLimit\|rateLimiter\|throttl'
category = "concept"
ground_truth = [
  "src/gateway/auth-rate-limit.ts",
  "src/infra/fixed-window-rate-limit.ts",
  "extensions/feishu/src/monitor.state.ts",
]

[[query]]
name = "concept-secret-redaction"
text = "sensitive data redaction in logs"
grep_pattern = "redact"
category = "concept"
ground_truth = [
  "src/logging/redact.ts",
  "src/logging/redact-identifier.ts",
  "src/logging/redact-bounded.ts",
]

[[query]]
name = "concept-cron-scheduling"
text = "cron job scheduling and periodic task execution"
grep_pattern = "cron"
category = "concept"
# NOTE: Paths verified 2026-03 — cron/ may contain nested service/ dir.
# Matching uses suffix comparison so both service.ts and service/jobs.ts work.
ground_truth = [
  "src/cron/service.ts",
  "src/cron/schedule.ts",
  "src/cron/parse.ts",
  "src/cron/delivery.ts",
  "src/cron/service/jobs.ts",
]

[[query]]
name = "concept-system-prompt-composition"
text = "system prompt building and composition for AI agents"
grep_pattern = 'systemPrompt\|PromptMode'
category = "concept"
ground_truth = [
  "src/agents/system-prompt.ts",
  "src/agents/system-prompt-params.ts",
  "src/agents/prompt-composition-scenarios.ts",
]

# ──────────────────────────────────────────────────────────────────────────────
# CROSS-PACKAGE queries — find files that import across package boundaries
#
# These use `codixing callers <target_file>` instead of `codixing search`,
# because "which files import from X" is a structural graph query, not text
# search. The `target_file` field tells the benchmark which file to look up
# callers for.
# ──────────────────────────────────────────────────────────────────────────────

[[query]]
name = "cross-pkg-plugin-sdk-entry"
text = "extensions that import from plugin-sdk"
grep_pattern = "import.*definePluginEntry.*from.*plugin-sdk"
category = "cross-package"
from_dir = "extensions"
to_dir = "src/plugin-sdk"
cross_pattern = true
ground_truth = [
  # GT refreshed 2026-04-26: current OpenClaw no longer has the old
  # anthropic/discord definePluginEntry imports for this query.
  "extensions/byteplus/index.ts",
  "extensions/volcengine/index.ts",
  "extensions/chutes/index.ts",
  "extensions/github-copilot/index.ts",
  "extensions/opencode/index.ts",
]

[[query]]
name = "cross-pkg-bundled-channel-entries"
text = "channel contracts that import from extensions"
grep_pattern = 'ChannelEntry\|ChannelSetupEntry'
category = "cross-package"
from_dir = "src/channels/plugins/contracts"
to_dir = "extensions"
ground_truth = [
  "src/channels/plugins/contracts/registry.ts",
]

[[query]]
name = "cross-pkg-security-from-gateway"
text = "gateway files that import from the security module"
grep_pattern = "import.*from.*security/"
category = "cross-package"
from_dir = "src/gateway"
to_dir = "src/security"
ground_truth = [
  "src/gateway/server-startup-log.ts",
]

[[query]]
name = "cross-pkg-config-types-from-agents"
text = "agent files that import from config module"
grep_pattern = "import.*from.*config/types"
category = "cross-package"
from_dir = "src/agents"
to_dir = "src/config"
# GT updated 2026-04-02: top-ranked files by PageRank+recency from cross_imports_ranked
ground_truth = [
  "src/agents/tools/session-status-tool.ts",
  "src/agents/acp-spawn.ts",
  "src/agents/context.ts",
  "src/agents/model-auth.ts",
  "src/agents/sandbox/config.ts",
]

[[query]]
name = "cross-pkg-plugin-contracts-registry"
text = "channel plugin contracts registry that imports from extensions"
grep_pattern = "import.*from.*extensions/"
category = "cross-package"
from_dir = "src/channels/plugins/contracts"
to_dir = "extensions"
ground_truth = [
  "src/channels/plugins/contracts/registry.ts",
]
