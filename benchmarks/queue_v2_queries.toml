text = "files that call redactSensitiveText"
grep_pattern = "import.*redactSensitiveText"
symbol = "redactSensitiveText"
category = "usage"
ground_truth = [
  "src/media/fetch.ts",
  "src/infra/errors.ts",
  "src/gateway/ws-log.ts",
  "src/agents/tools/sessions-history-tool.ts",
  "src/agents/pi-embedded-error-observation.ts",
  "extensions/telegram/src/send.ts",
  "extensions/matrix/src/matrix/sdk/logger.ts",
  "extensions/diagnostics-otel/src/service.ts",
]

[[query]]
name = "usage-create-auth-rate-limiter"
text = "files that use createAuthRateLimiter"
grep_pattern = "import.*createAuthRateLimiter"
symbol = "createAuthRateLimiter"
category = "usage"
ground_truth = [
  "src/gateway/server.impl.ts",
]

[[query]]
name = "usage-channel-plugin-imports"
