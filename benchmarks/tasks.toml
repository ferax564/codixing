# Benchmark tasks for each repository
# Categories mirror SWE-bench evaluation dimensions:
#   1. Symbol lookup (find definitions)
#   2. Code understanding (explain how X works)
#   3. Call graph navigation (who calls X, what does X call)
#   4. Bug localization (find code related to a bug report)
#   5. Impact analysis (what changes if we modify X)
#   6. Architecture overview (understand project structure)

# ═══════════════════════════════════════════════════════════════════════
# TOKIO
# ═══════════════════════════════════════════════════════════════════════

[[task]]
repo = "tokio"
id = "tokio-1"
category = "symbol_lookup"
description = "Find where Runtime struct is defined and its fields"
query = "Runtime"
baseline_commands = [
    "grep -rn 'pub struct Runtime' --include='*.rs'",
    "cat tokio/src/runtime/runtime.rs",
]
codixing_commands = [
    "find_symbol Runtime",
]
expected_file = "tokio/src/runtime/runtime.rs"

[[task]]
repo = "tokio"
id = "tokio-2"
category = "code_understanding"
description = "Understand how task spawning works"
query = "how does task spawning work in tokio"
baseline_commands = [
    "grep -rn 'pub fn spawn' --include='*.rs'",
    "grep -rn 'fn spawn_inner' --include='*.rs'",
    "cat tokio/src/runtime/handle.rs",
]
codixing_commands = [
    "search 'task spawning mechanism'",
]

[[task]]
repo = "tokio"
id = "tokio-3"
category = "call_graph"
description = "Find all callers of JoinHandle::abort"
query = "JoinHandle::abort callers"
baseline_commands = [
    "grep -rn 'abort()' --include='*.rs'",
    "grep -rn 'JoinHandle' --include='*.rs' | grep abort",
]
codixing_commands = [
    "symbol_callers abort --file join.rs",
]

[[task]]
repo = "tokio"
id = "tokio-4"
category = "impact_analysis"
description = "What depends on the io module?"
query = "io module dependencies"
baseline_commands = [
    "grep -rn 'use tokio::io' --include='*.rs'",
    "grep -rn 'mod io' --include='*.rs'",
]
codixing_commands = [
    "callers tokio/src/io/mod.rs",
]

[[task]]
repo = "tokio"
id = "tokio-5"
category = "architecture"
description = "Get tokio project structure overview"
query = "project structure"
baseline_commands = [
    "find . -name '*.rs' -exec wc -l {} + | sort -rn | head -30",
    "head -50 tokio/src/lib.rs",
    "head -50 tokio/src/runtime/mod.rs",
]
codixing_commands = [
    "graph --map --token-budget 2000",
]

[[task]]
repo = "tokio"
id = "tokio-6"
category = "bug_localization"
description = "Find code related to 'timer resolution' or 'sleep accuracy'"
query = "timer resolution sleep accuracy"
baseline_commands = [
    "grep -rn 'timer' --include='*.rs' | head -50",
    "grep -rn 'sleep' --include='*.rs' | head -50",
    "grep -rn 'resolution' --include='*.rs'",
]
codixing_commands = [
    "search 'timer resolution sleep accuracy'",
]

