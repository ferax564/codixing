<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="50%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#00d4aa" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b949e"/>
      <stop offset="100%" stop-color="#8b949e" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(48,54,61,0.3)" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#glow)"/>

  <!-- Logo mark -->
  <text x="80" y="120" font-family="monospace" font-size="28" font-weight="700" fill="#00d4aa" letter-spacing="1">&#x276E;/&#x276F;</text>

  <!-- Title -->
  <text x="80" y="200" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="700" fill="#f0f6fc">Codixing</text>

  <!-- Subtitle -->
  <text x="80" y="255" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="400" fill="#8b949e">Code Retrieval Engine for AI Agents</text>

  <!-- Divider -->
  <rect x="80" y="285" width="120" height="2" fill="#00d4aa" opacity="0.6" rx="1"/>

  <!-- Benchmark comparison -->
  <!-- Codixing bar -->
  <text x="80" y="340" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="500" fill="#8b949e">R@10 Retrieval Accuracy</text>

  <text x="80" y="378" font-family="JetBrains Mono, monospace" font-size="15" font-weight="500" fill="#00d4aa">codixing</text>
  <rect x="220" y="362" width="500" height="24" rx="4" fill="url(#bar1)"/>
  <text x="730" y="381" font-family="JetBrains Mono, monospace" font-size="18" font-weight="600" fill="#00d4aa">0.763</text>

  <text x="80" y="420" font-family="JetBrains Mono, monospace" font-size="15" font-weight="500" fill="#8b949e">grep</text>
  <rect x="220" y="404" width="242" height="24" rx="4" fill="url(#bar2)"/>
  <text x="472" y="423" font-family="JetBrains Mono, monospace" font-size="18" font-weight="600" fill="#8b949e">0.345</text>

  <!-- Stats row -->
  <text x="80" y="500" font-family="JetBrains Mono, monospace" font-size="20" font-weight="600" fill="#00d4aa">73%</text>
  <text x="160" y="500" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">fewer tokens</text>

  <text x="330" y="500" font-family="JetBrains Mono, monospace" font-size="20" font-weight="600" fill="#00d4aa">57</text>
  <text x="370" y="500" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">MCP tools</text>

  <text x="510" y="500" font-family="JetBrains Mono, monospace" font-size="20" font-weight="600" fill="#00d4aa">1.6s</text>
  <text x="575" y="500" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8b949e">cold start (73K files)</text>

  <!-- Tech badges -->
  <rect x="80" y="540" width="60" height="26" rx="13" fill="rgba(0,212,170,0.12)" stroke="rgba(0,212,170,0.3)" stroke-width="1"/>
  <text x="110" y="558" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#00d4aa" text-anchor="middle">Rust</text>

  <rect x="152" y="540" width="70" height="26" rx="13" fill="rgba(0,212,170,0.12)" stroke="rgba(0,212,170,0.3)" stroke-width="1"/>
  <text x="187" y="558" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#00d4aa" text-anchor="middle">BM25</text>

  <rect x="234" y="540" width="100" height="26" rx="13" fill="rgba(0,212,170,0.12)" stroke="rgba(0,212,170,0.3)" stroke-width="1"/>
  <text x="284" y="558" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#00d4aa" text-anchor="middle">Embeddings</text>

  <rect x="346" y="540" width="90" height="26" rx="13" fill="rgba(0,212,170,0.12)" stroke="rgba(0,212,170,0.3)" stroke-width="1"/>
  <text x="391" y="558" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#00d4aa" text-anchor="middle">PageRank</text>

  <rect x="448" y="540" width="60" height="26" rx="13" fill="rgba(0,212,170,0.12)" stroke="rgba(0,212,170,0.3)" stroke-width="1"/>
  <text x="478" y="558" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#00d4aa" text-anchor="middle">MCP</text>

  <!-- Right side decorative element -->
  <g opacity="0.08">
    <text x="850" y="200" font-family="JetBrains Mono, monospace" font-size="14" fill="#00d4aa">fn code_search(query: &amp;str)</text>
    <text x="850" y="224" font-family="JetBrains Mono, monospace" font-size="14" fill="#8b949e">  -&gt; Vec&lt;SearchResult&gt; {</text>
    <text x="850" y="248" font-family="JetBrains Mono, monospace" font-size="14" fill="#8b949e">  let bm25 = engine.bm25(query);</text>
    <text x="850" y="272" font-family="JetBrains Mono, monospace" font-size="14" fill="#8b949e">  let embed = engine.embed(query);</text>
    <text x="850" y="296" font-family="JetBrains Mono, monospace" font-size="14" fill="#8b949e">  let graph = engine.pagerank();</text>
    <text x="850" y="320" font-family="JetBrains Mono, monospace" font-size="14" fill="#8b949e">  fuse(bm25, embed, graph)</text>
    <text x="850" y="344" font-family="JetBrains Mono, monospace" font-size="14" fill="#8b949e">}</text>
  </g>

  <!-- URL -->
  <text x="1120" y="590" font-family="JetBrains Mono, monospace" font-size="14" font-weight="500" fill="#484f58" text-anchor="end">codixing.com</text>
</svg>
